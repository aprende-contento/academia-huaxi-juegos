<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trivia Academia — Academia Huaxi</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <style>:root{--bg:#1A0F3C;--accent:#FFD700;--text:#F0EBF8;--text-muted:#9A8EC0;--font-display:'Baloo 2',system-ui,sans-serif;--font-body:'Nunito',system-ui,sans-serif;}*{box-sizing:border-box;margin:0;padding:0;}body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;}.emoji{font-size:4rem;margin-bottom:1.5rem;}h1{font-family:var(--font-display);font-weight:800;font-size:2.5rem;color:var(--accent);margin-bottom:0.75rem;}p{color:var(--text-muted);font-size:1rem;max-width:380px;line-height:1.6;margin-bottom:2rem;}a{display:inline-flex;align-items:center;gap:0.4rem;padding:0.65rem 1.4rem;border-radius:10px;background:rgba(255,215,0,0.08);color:var(--accent);font-weight:700;font-size:0.9rem;text-decoration:none;border:1.5px solid var(--accent);transition:background 0.2s;}a:hover{background:rgba(255,215,0,0.15);}</style>
</head>

  <div class="emoji">🏆</div>
